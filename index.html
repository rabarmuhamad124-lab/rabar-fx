<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>ICT Dashboard</title>
    <style>
        body { background-color: #0b0e14; color: white; font-family: sans-serif; padding: 20px; }
        .chart-box { height: 400px; width: 100%; border-radius: 10px; overflow: hidden; }
        .ict-info { background: #1a1e29; padding: 20px; border-radius: 10px; margin-top: 20px; border-left: 5px solid #2962ff; }
        h2 { color: #2962ff; }
    </style>
</head>
<body>

    <h2>ICT/SMT Analysis</h2>
    <div id="tv_ict" class="chart-box"></div>

    <div class="ict-info">
        <h3>دیاریکردنی هەنگاوەکان:</h3>
        <p><strong>BOS (Break of Structure):</strong> لێرەدا دەستنیشانی بکە.</p>
        <p><strong>CHOCH (Change of Character):</strong> لێرەدا دەستنیشانی بکە.</p>
        <p><strong>Order Block:</strong> شوێنی ورود دیاری بکە.</p>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        new TradingView.widget({
            "container_id": "tv_ict",
            "symbol": "OANDA:XAUUSD",
            "theme": "dark",
            "interval": "15",
            "width": "100%",
            "height": "400"
        });
    </script>
</body>
</html>
