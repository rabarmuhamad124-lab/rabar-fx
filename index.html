<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>Rabar FX Library</title>
    <style>
        body { margin: 0; background-color: #0b0e14; color: #d1d4dc; font-family: sans-serif; }
        .nav { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 10px; }
        button { padding: 12px; background: #2a2e39; border: none; color: white; border-radius: 5px; cursor: pointer; }
        button.active { background: #2962ff; }
        .room { display: none; padding: 15px; }
        .room.active { display: block; }
        .box { background: #181c25; padding: 15px; border-radius: 8px; border-left: 4px solid #2962ff; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="nav">
        <button onclick="showRoom('ict-chart')">ICT/SMT Chart</button>
        <button onclick="showRoom('tesla-chart')">Tesla Zones</button>
        <button onclick="showRoom('signals')">Signals</button>
        <button onclick="showRoom('analysis')">Daily Analysis</button>
    </div>

    <div id="ict-chart" class="room active">
        <div class="box"><h3>ICT/SMT Chart Room</h3><p>لێرە چارتەکە بۆ دیاریکردنی BOS, CHOCH, SMT دابنێ...</p></div>
    </div>

    <div id="tesla-chart" class="room">
        <div class="box"><h3>Tesla 3-6-9 Chart</h3><p>لێرە زۆنەکانی 3-6-9ـی تێسلا دیاری بکە...</p></div>
    </div>

    <div id="signals" class="room">
        <div class="box"><h3>Signals Room</h3><p>سیگناڵەکانی ICT و تێسلا لێرە ڕیز بکە...</p></div>
    </div>

    <div id="analysis" class="room">
        <div class="box"><h3>Daily Analysis</h3><p>شیکاری ڕۆژانە لەسەر بنەمای هەموو زانستەکان...</p></div>
    </div>

    <script>
        function showRoom(id) {
            document.querySelectorAll('.room').forEach(r => r.classList.remove('active'));
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
