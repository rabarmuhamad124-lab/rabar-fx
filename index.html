<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>RABAR FX AI</title>
    <style>
        /* لێرە ستایلەکەت دەست پێ دەکات */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #0b0e14; color: #fff; }
        #app { display: flex; flex-direction: column; padding: 10px; }

        .sidebar { background: #161a25; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .logo h1 { color: #f9a825; font-size: 20px; }
        .menu { display: flex; gap: 15px; margin-top: 10px; }
        .menu a { color: #fff; text-decoration: none; font-size: 14px; }

        .chart-container { height: 300px; background: #000; border-radius: 8px; margin-bottom: 15px; }
        
        .overview { background: #161a25; padding: 15px; border-radius: 10px; }
        .data-box { border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

    <div id="app">
        <nav class="sidebar">
            <div class="logo"><h1>RABAR FX AI</h1></div>
            <div class="menu">
                <a href="#">Dashboard</a>
                <a href="#">Analysis</a>
                <a href="#">Signals</a>
            </div>
        </nav>

        <main class="content">
            <div id="tvchart" class="chart-container"></div>
            
            <section class="overview">
                <h2>Market Overview</h2>
                <div class="data-box">
                    <p>لێرە زانیاری و شیکارییەکان دەردەکەون...</p>
                </div>
            </section>
        </main>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        new TradingView.widget({"container_id":"tvchart","symbol":"OANDA:XAUUSD","theme":"dark","width":"100%","height":"300"});
    </script>
</body>
</html>
