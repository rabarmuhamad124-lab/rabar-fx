<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabar FX</title>
    <style>
        body { margin: 0; background-color: #0b0e14; color: #fff; font-family: sans-serif; }
        .nav { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 10px; }
        button { padding: 12px; background: #1f222e; border: none; color: #fff; border-radius: 4px; font-weight: bold; }
        button.active { background: #2962ff; }
        .room { display: none; padding: 10px; }
        .room.active { display: block; }
        .chart-box { height: 280px; width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 15px; border: 1px solid #333; }
        .data-box { padding: 15px; background: #161a25; border-radius: 8px; border-left: 4px solid #2962ff; min-height: 150px; }
    </style>
</head>
<body>

    <div class="nav">
        <button class="active" onclick="showRoom(event, 'ict')">ICT/SMT</button>
        <button onclick="showRoom(event, 'tesla')">Tesla</button>
        <button onclick="showRoom(event, 'signals')">Signals</button>
        <button onclick="showRoom(event, 'analysis')">Analysis</button>
    </div>

    <div id="ict" class="room active">
        <div id="tv_ict" class="chart-box"></div>
        <div class="data-box"><h3>شیکاری ICT/SMT</h3><p>BOS و CHOCH لێرە بنووسە...</p></div>
    </div>

    <div id="tesla" class="room">
        <div id="tv_tesla" class="chart-box"></div>
        <div class="data-box"><h3>Tesla Zones</h3><p>زۆنەکانی 3-6-9 لێرە دیاری بکە...</p></div>
    </div>

    <div id="signals" class="room">
        <div class="data-box"><h3>سیگناڵەکان (Buy/Sell)</h3><p>TP1, TP2, TP3 و SL لێرە دابنێ...</p></div>
    </div>

    <div id="analysis" class="room">
        <div class="data-box"><h3>شیکاری ڕۆژانە</h3><p>شیکاری گۆڵد و ناسداک لێرە بنووسە...</p></div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        new TradingView.widget({"container_id":"tv_ict","symbol":"OANDA:XAUUSD","theme":"dark"});
        new TradingView.widget({"container_id":"tv_tesla","symbol":"OANDA:XAUUSD","theme":"dark"});

        function showRoom(evt, id) {
            document.querySelectorAll('.room').forEach(r => r.classList.remove('active'));
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            evt.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
