<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>Rabar FX AI</title>
    <style>
        body { margin: 0; background-color: #0b0e14; color: #fff; font-family: sans-serif; }
        .grid-container { display: grid; grid-template-columns: 1fr; gap: 10px; padding: 10px; }
        .box { background: #1a1e29; padding: 15px; border-radius: 8px; border: 1px solid #2962ff; }
        .chart-box { height: 300px; background: #000; border-radius: 8px; }
        .signals-box { background: #161a25; border-left: 4px solid #00c853; padding: 15px; }
    </style>
</head>
<body>

    <div class="grid-container">
        <div id="tv_chart" class="chart-box"></div>

        <div class="box">
            <h3>AI Analysis</h3>
            <p><strong>Score:</strong> 94% Strong Buy</p>
            <p><strong>Market Structure:</strong> Bullish</p>
        </div>

        <div class="signals-box">
            <h3>Signals Room</h3>
            <p>Entry: 2342.50 | SL: 2315.00</p>
            <p>TP1: 2410 | TP2: 2455</p>
        </div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        new TradingView.widget({"container_id":"tv_chart","symbol":"OANDA:XAUUSD","theme":"dark","width":"100%","height":"300"});
    </script>
</body>
</html>
