<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>Rabar FX Dashboard</title>
    <style>
        body { margin: 0; background-color: #0b0e14; color: white; font-family: sans-serif; }
        .nav { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 10px; }
        button { padding: 10px; background: #2a2e39; border: none; color: white; border-radius: 5px; cursor: pointer; }
        button.active { background: #2962ff; }
        .room { display: none; padding: 15px; }
        .room.active { display: block; }
        .chart { height: 350px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="nav">
        <button class="active" onclick="showRoom(event, 'ict')">ICT Chart</button>
        <button onclick="showRoom(event, 'tesla')">Tesla Chart</button>
        <button onclick="showRoom(event, 'chart3')">Chart 3</button>
        <button onclick="showRoom(event, 'chart4')">Chart 4</button>
    </div>

    <div id="ict" class="room active"><div id="tv_ict" class="chart"></div></div>
    <div id="tesla" class="room"><div id="tv_tesla" class="chart"></div></div>
    <div id="chart3" class="room"><div id="tv_chart3" class="chart"></div></div>
    <div id="chart4" class="room"><div id="tv_chart4" class="chart"></div></div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        new TradingView.widget({"container_id":"tv_ict","symbol":"OANDA:XAUUSD","theme":"dark"});
        new TradingView.widget({"container_id":"tv_tesla","symbol":"OANDA:XAUUSD","theme":"dark"});
        new TradingView.widget({"container_id":"tv_chart3","symbol":"OANDA:EURUSD","theme":"dark"});
        new TradingView.widget({"container_id":"tv_chart4","symbol":"OANDA:GBPUSD","theme":"dark"});

        function showRoom(evt, id) {
            document.querySelectorAll('.room').forEach(r => r.classList.remove('active'));
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            evt.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
