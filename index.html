<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>RABAR FX AI</title>
    <style>
        /* ڕەنگ و دیزاینی ڕەش و زێڕی */
        body { background: #05070a; color: #fff; margin: 0; font-family: sans-serif; }
        .app-container { display: flex; flex-direction: column; height: 100vh; padding: 10px; }
        
        .top-nav { background: #161a25; padding: 15px; border-bottom: 2px solid #f9a825; display: flex; justify-content: space-between; }
        .chart-main { flex-grow: 1; margin-top: 10px; background: #000; }
        
        /* بۆکسەکانی خوارەوە */
        .bottom-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .box { background: #161a25; padding: 10px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="app-container">
        <nav class="top-nav">
            <div class="logo">RABAR FX AI</div>
            <div>Dashboard | Analysis | Signals</div>
        </nav>
        <div id="tvchart" class="chart-main"></div>
        <div class="bottom-info">
            <div class="box">AI Score: 94%</div>
            <div class="box">Entry: 4192</div>
        </div>
    </div>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        new TradingView.widget({"container_id":"tvchart","symbol":"OANDA:XAUUSD","theme":"dark","width":"100%","height":"300"});
    </script>
</body>
</html>
